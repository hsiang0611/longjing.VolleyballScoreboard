<!doctype html>
<html lang="zh-Hant">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>青商盃排球計分板</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Barlow:wght@400;500;600;700&family=Noto+Sans+TC:wght@500;700;900&display=swap');

:root{
  --bg:#041f38; --bg-2:#07294a; --bg-3:#0d3a64; --panel:#052a4a;
  --line:rgba(255,255,255,.09); --line-2:rgba(255,255,255,.16);
  --text:#eaf3ff; --muted:#8fb1d0;
  --jci:#009CDE;            /* JCI 官方藍 (PMS 2925) */
  --accent:#00a7e8;         /* 互動藍 */
  --accent-2:#ffc83d;       /* 排球黃 / 副色 */
  --live:#ff3b5c; --gold:#ffd24a;
  --radius:16px; --shadow:0 18px 50px rgba(0,0,0,.5);
}
*{box-sizing:border-box; margin:0; padding:0;}
body{
  font-family:'Barlow','Noto Sans TC',system-ui,sans-serif; color:var(--text);
  background:
    radial-gradient(1100px 560px at 86% -12%, rgba(0,156,222,.30), transparent 60%),
    radial-gradient(900px 620px at -8% 112%, rgba(255,200,61,.12), transparent 55%),
    linear-gradient(180deg,#04203a,#031829);
  background-attachment:fixed; min-height:100vh; letter-spacing:.01em;
}
/* 排球網格紋理 */
body::before{
  content:""; position:fixed; inset:0; pointer-events:none; z-index:0; opacity:.5;
  background-image:
    repeating-linear-gradient(45deg, rgba(255,255,255,.020) 0 1px, transparent 1px 22px),
    repeating-linear-gradient(-45deg, rgba(255,255,255,.020) 0 1px, transparent 1px 22px);
}
/* 大型排球浮水印 */
.court-bg{position:fixed; right:-90px; bottom:-90px; width:460px; height:460px; z-index:0; opacity:.06; pointer-events:none;}
.wrap{position:relative; z-index:1; max-width:1180px; margin:0 auto; padding:0 18px 80px;}

/* ---------- 頁首 ---------- */
.topbar{position:sticky; top:0; z-index:50; backdrop-filter:blur(14px);
  background:linear-gradient(180deg, rgba(4,32,58,.95), rgba(4,32,58,.7)); border-bottom:1px solid var(--line);}
.topbar::after{ /* 排球網的底線 */
  content:""; display:block; height:8px;
  background:
    repeating-linear-gradient(90deg, rgba(255,255,255,.18) 0 1px, transparent 1px 9px),
    linear-gradient(90deg, var(--jci), var(--accent-2));
  opacity:.9;}
.topbar-inner{max-width:1180px; margin:0 auto; padding:13px 18px; display:flex; align-items:center; gap:14px; flex-wrap:wrap;}
.emblem{width:54px; height:60px; flex:none; filter:drop-shadow(0 4px 10px rgba(0,156,222,.45));}
.titles{display:flex; flex-direction:column; gap:2px; min-width:180px;}
.evt-title{font-family:'Noto Sans TC','Oswald',sans-serif; font-weight:900; font-size:23px; letter-spacing:.02em; line-height:1.1;
  color:var(--text); background:transparent; border:1px solid transparent; border-radius:8px; padding:2px 6px; max-width:420px;}
.evt-sub{font-family:'Oswald',sans-serif; font-weight:600; font-size:12px; letter-spacing:.16em; text-transform:uppercase;
  color:var(--jci); background:transparent; border:1px solid transparent; border-radius:6px; padding:2px 6px; max-width:420px;}
.evt-title:hover,.evt-sub:hover{border-color:var(--line);}
.evt-title:focus,.evt-sub:focus{outline:none; border-color:var(--accent); background:rgba(0,0,0,.25);}
.spacer{flex:1;}

/* 會徽上傳格 */
.logo-slot{width:56px; height:56px; border-radius:50%; flex:none; cursor:pointer; overflow:hidden;
  border:2px dashed var(--line-2); display:flex; align-items:center; justify-content:center; position:relative;
  background:rgba(255,255,255,.04); transition:.15s; color:var(--muted); font-size:10px; text-align:center; line-height:1.2;}
.logo-slot:hover{border-color:var(--jci); color:var(--jci);}
.logo-slot.has-logo{border-style:solid; border-color:var(--jci); background:#fff;}
.logo-slot img{width:100%; height:100%; object-fit:contain;}
.logo-slot .x{position:absolute; top:-6px; right:-6px; width:18px; height:18px; border-radius:50%; background:var(--live);
  color:#fff; font-size:11px; line-height:18px; text-align:center; display:none;}
.logo-slot.has-logo:hover .x{display:block;}

.tools{display:flex; gap:8px; flex-wrap:wrap;}
.btn{font-family:'Barlow','Noto Sans TC'; font-weight:600; font-size:13px; color:var(--text); cursor:pointer;
  background:var(--bg-3); border:1px solid var(--line-2); border-radius:10px; padding:8px 13px; transition:.15s;}
.btn:hover{border-color:var(--jci); color:var(--jci);}
.btn.warn:hover{border-color:var(--live); color:var(--live);}

/* 分頁 */
.tabs{display:flex; gap:8px; margin:22px 0 10px;}
.tab{font-family:'Oswald','Noto Sans TC',sans-serif; font-weight:600; font-size:15px; letter-spacing:.05em;
  padding:10px 22px; border-radius:11px; cursor:pointer; color:var(--muted);
  background:rgba(255,255,255,.03); border:1px solid var(--line); transition:.15s; display:flex; align-items:center; gap:8px;}
.tab.active{color:#fff; background:linear-gradient(135deg, rgba(0,156,222,.30), rgba(255,200,61,.12)); border-color:var(--jci);}
.tab svg{width:18px; height:18px;}

.section-title{font-family:'Oswald','Noto Sans TC',sans-serif; font-weight:600; font-size:14px; letter-spacing:.16em;
  color:var(--muted); margin:26px 2px 12px; display:flex; align-items:center; gap:10px; text-transform:uppercase;}
.section-title .vb{width:18px; height:18px; flex:none;}
.section-title::after{content:""; flex:1; height:1px;
  background:repeating-linear-gradient(90deg, var(--line) 0 6px, transparent 6px 12px);}

/* 即時比數卡 */
.live-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(330px,1fr)); gap:16px;}
.lcard{background:linear-gradient(160deg, var(--bg-2), var(--panel)); border:1px solid var(--line); border-radius:var(--radius);
  padding:18px; box-shadow:var(--shadow); position:relative; overflow:hidden;}
.lcard::after{content:""; position:absolute; right:-26px; top:-26px; width:90px; height:90px; opacity:.07;
  background:radial-gradient(circle at 30% 30%, #fff 0 2px, transparent 2px), var(--jci); border-radius:50%;}
.lcard.live{border-color:rgba(255,59,92,.5);}
.lcard.live::before{content:""; position:absolute; inset:0; pointer-events:none;
  background:radial-gradient(420px 120px at 50% -30%, rgba(255,59,92,.16), transparent 70%);}
.lcard-top{display:flex; align-items:center; gap:8px; font-size:12px; color:var(--muted); margin-bottom:14px; position:relative; z-index:1;}
.badge{font-family:'Oswald',sans-serif; font-weight:600; font-size:11px; letter-spacing:.08em; padding:3px 9px; border-radius:999px;
  border:1px solid var(--line-2); text-transform:uppercase;}
.badge.group{color:var(--accent-2); border-color:rgba(255,200,61,.45);}
.badge.s-live{color:#fff; background:var(--live); border-color:var(--live); animation:blink 1.4s infinite;}
.badge.s-done{color:var(--gold); border-color:rgba(255,210,74,.45);}
.badge.s-sched{color:var(--muted);}
@keyframes blink{50%{opacity:.55;}}
.team-row{display:flex; align-items:center; justify-content:space-between; gap:12px; padding:8px 0; position:relative; z-index:1;}
.team-row+.team-row{border-top:1px solid var(--line);}
.tname{font-family:'Oswald','Noto Sans TC',sans-serif; font-weight:600; font-size:21px; letter-spacing:.02em;}
.tname.win{color:var(--gold);}
.tscore{font-family:'Oswald',sans-serif; font-weight:700; font-size:40px; line-height:1; min-width:60px; text-align:right;}
.tscore.cur{color:var(--accent);}
.sets-chips{display:flex; gap:6px; flex-wrap:wrap; margin-top:13px; padding-top:12px; border-top:1px dashed var(--line); position:relative; z-index:1;}
.chip{font-family:'Oswald',sans-serif; font-size:12px; font-weight:600; color:var(--muted);
  background:rgba(255,255,255,.04); border:1px solid var(--line); border-radius:7px; padding:3px 8px;}
.chip b{color:var(--text);}
.empty{color:var(--muted); padding:34px; text-align:center; border:1px dashed var(--line); border-radius:var(--radius);
  display:flex; flex-direction:column; align-items:center; gap:12px;}
.empty .vb{width:46px; height:46px; opacity:.6;}

/* 賽程 */
.sched-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:12px;}
.scard{background:var(--panel); border:1px solid var(--line); border-radius:13px; padding:14px 15px; display:flex; flex-direction:column; gap:9px;}
.scard .row{display:flex; align-items:center; justify-content:space-between; gap:10px;}
.scard .vs-team{font-family:'Oswald','Noto Sans TC',sans-serif; font-weight:600; font-size:16px;}
.scard .meta{font-size:12px; color:var(--muted);}
.mini-score{font-family:'Oswald',sans-serif; font-weight:700; font-size:18px; color:var(--jci);}

/* 後台計分 */
.admin-grid{display:grid; grid-template-columns:repeat(auto-fill,minmax(360px,1fr)); gap:16px;}
.acard{background:linear-gradient(160deg, var(--bg-2), var(--panel)); border:1px solid var(--line); border-radius:var(--radius); padding:16px; box-shadow:var(--shadow);}
.acard.live{border-color:rgba(255,59,92,.45);}
.acard-top{display:flex; align-items:center; gap:8px; margin-bottom:12px; font-size:12px; color:var(--muted);}
.side{display:flex; align-items:center; gap:10px; padding:10px 0;}
.side .nm{flex:1;}
.side input.team-edit{width:100%; font-family:'Oswald','Noto Sans TC',sans-serif; font-weight:600; font-size:17px; color:var(--text);
  background:transparent; border:1px solid transparent; border-radius:8px; padding:5px 7px;}
.side input.team-edit:hover{border-color:var(--line);}
.side input.team-edit:focus{outline:none; border-color:var(--jci); background:rgba(0,0,0,.25);}
.stepper{display:flex; align-items:center; gap:8px;}
.sbtn{width:38px; height:38px; border-radius:10px; border:1px solid var(--line-2); background:var(--bg-3); color:var(--text);
  font-size:20px; font-weight:700; cursor:pointer; transition:.12s; display:flex; align-items:center; justify-content:center;}
.sbtn:hover{border-color:var(--jci); color:var(--jci);}
.sbtn.minus:hover{border-color:var(--muted); color:var(--muted);}
.sbtn:disabled{opacity:.3; cursor:not-allowed;}
.snum{font-family:'Oswald',sans-serif; font-weight:700; font-size:32px; min-width:50px; text-align:center;}
.acard-actions{display:flex; gap:8px; margin-top:12px; padding-top:12px; border-top:1px solid var(--line); flex-wrap:wrap;}
.acard-actions .btn{flex:1; text-align:center; padding:9px;}
.btn.go{background:rgba(0,156,222,.16); border-color:rgba(0,156,222,.5); color:var(--jci);}
.btn.fin{background:rgba(255,210,74,.12); border-color:rgba(255,210,74,.4); color:var(--gold);}
.cur-set-tag{font-family:'Oswald',sans-serif; font-size:12px; font-weight:600; color:var(--accent); letter-spacing:.06em;}

.filters{display:flex; gap:8px; margin:4px 0 16px; flex-wrap:wrap;}
.filter{font-size:13px; font-weight:600; padding:6px 14px; border-radius:999px; cursor:pointer; color:var(--muted);
  background:rgba(255,255,255,.03); border:1px solid var(--line); transition:.15s;}
.filter.active{color:#fff; border-color:var(--jci);}
.hint{font-size:12.5px; color:var(--muted); margin-top:10px; line-height:1.7;}
.hidden{display:none !important;}

/* 大螢幕模式 */
body.board-mode .topbar, body.board-mode .tabs, body.board-mode #view-admin,
body.board-mode #schedule-wrap, body.board-mode .board-hide{display:none !important;}
body.board-mode .wrap{max-width:1500px; padding-top:26px;}
body.board-mode .board-head{display:flex !important;}
body.board-mode .live-grid{grid-template-columns:repeat(auto-fill,minmax(440px,1fr)); gap:22px;}
body.board-mode .tname{font-size:30px;}
body.board-mode .tscore{font-size:64px; min-width:96px;}
body.board-mode .lcard{padding:26px;}
.board-head{display:none; align-items:center; gap:16px; margin-bottom:6px;}
.board-head .emblem{width:60px; height:66px;}
.board-head h1{font-family:'Noto Sans TC',sans-serif; font-weight:900; font-size:34px;}
.board-head .sub{font-family:'Oswald',sans-serif; letter-spacing:.18em; color:var(--jci); font-size:14px;}
.board-exit{position:fixed; right:16px; bottom:16px; z-index:80;}

@media(max-width:520px){
  .live-grid,.admin-grid,.sched-grid{grid-template-columns:1fr;}
  .evt-title{font-size:19px;}
}
</style>
</head>
<body>

<!-- 背景大排球浮水印 -->
<svg class="court-bg" viewBox="0 0 100 100" aria-hidden="true">
  <circle cx="50" cy="50" r="48" fill="none" stroke="#fff" stroke-width="2"/>
  <path d="M50 2 C30 26 30 74 50 98" fill="none" stroke="#fff" stroke-width="2"/>
  <path d="M50 2 C70 26 70 74 50 98" fill="none" stroke="#fff" stroke-width="2"/>
  <path d="M3 38 C32 50 68 50 97 38" fill="none" stroke="#fff" stroke-width="2"/>
  <path d="M3 62 C32 50 68 50 97 62" fill="none" stroke="#fff" stroke-width="2"/>
</svg>

<header class="topbar">
  <div class="topbar-inner">
    <!-- 原創排球盾形徽章 (青商藍 + 排球) -->
    <svg class="emblem" viewBox="0 0 64 72" aria-hidden="true">
      <defs>
        <linearGradient id="shieldG" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0" stop-color="#33b8ec"/><stop offset="1" stop-color="#0072b0"/>
        </linearGradient>
      </defs>
      <path d="M32 3 L59 12 L59 36 C59 53 47 64 32 69 C17 64 5 53 5 36 L5 12 Z"
            fill="url(#shieldG)" stroke="#ffd24a" stroke-width="1.6"/>
      <!-- 漣漪 -->
      <path d="M16 50 C24 56 40 56 48 50" fill="none" stroke="#ffd24a" stroke-width="1.4" opacity=".8"/>
      <!-- 排球 -->
      <circle cx="32" cy="29" r="15" fill="#fff"/>
      <path d="M32 15 C25 21 25 37 32 44" fill="none" stroke="#0072b0" stroke-width="1.8"/>
      <path d="M32 15 C39 21 39 37 32 44" fill="none" stroke="#0072b0" stroke-width="1.8"/>
      <path d="M19 23 C26 27 38 27 45 23" fill="none" stroke="#0072b0" stroke-width="1.8"/>
      <path d="M19 36 C26 32 38 32 45 36" fill="none" stroke="#0072b0" stroke-width="1.8"/>
    </svg>

    <div class="titles">
      <input class="evt-title" id="evtTitle" value="青商盃排球錦標賽" onchange="setBrand('title', this.value)">
      <input class="evt-sub" id="evtSub" value="JCI VOLLEYBALL CUP · 青年商會" onchange="setBrand('subtitle', this.value)">
    </div>

    <div class="spacer"></div>

    <div class="logo-slot" id="logoSlot" title="點擊上傳分會會徽" onclick="onLogoClick(event)">
      <span class="ph">上傳<br>會徽</span>
      <span class="x" onclick="clearLogo(event)">×</span>
    </div>
    <input id="logoFile" type="file" accept="image/*" class="hidden" onchange="uploadLogo(this.files[0]); this.value='';">

    <div class="tools">
      <button class="btn" onclick="openBoard()">🔲 大螢幕</button>
      <button class="btn" onclick="exportJSON()">⬇ 匯出 JSON</button>
      <button class="btn" onclick="document.getElementById('importFile').click()">⬆ 匯入 JSON</button>
      <input id="importFile" type="file" accept="application/json,.json" class="hidden" onchange="importJSON(this.files[0]); this.value='';">
      <button class="btn warn" onclick="resetAll()">↺ 全部重來</button>
    </div>
  </div>
</header>

<div class="wrap">
  <!-- 大螢幕模式的標題列 -->
  <div class="board-head" id="boardHead">
    <svg class="emblem" viewBox="0 0 64 72" aria-hidden="true">
      <path d="M32 3 L59 12 L59 36 C59 53 47 64 32 69 C17 64 5 53 5 36 L5 12 Z" fill="url(#shieldG)" stroke="#ffd24a" stroke-width="1.6"/>
      <circle cx="32" cy="29" r="15" fill="#fff"/>
      <path d="M32 15 C25 21 25 37 32 44" fill="none" stroke="#0072b0" stroke-width="1.8"/>
      <path d="M32 15 C39 21 39 37 32 44" fill="none" stroke="#0072b0" stroke-width="1.8"/>
      <path d="M19 23 C26 27 38 27 45 23" fill="none" stroke="#0072b0" stroke-width="1.8"/>
      <path d="M19 36 C26 32 38 32 45 36" fill="none" stroke="#0072b0" stroke-width="1.8"/>
    </svg>
    <div><h1 id="boardTitle">青商盃排球錦標賽</h1><div class="sub" id="boardSub">JCI VOLLEYBALL CUP</div></div>
  </div>

  <div class="tabs">
    <div class="tab active" data-tab="scoreboard" onclick="switchTab('scoreboard')">
      <svg class="vb" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><circle cx="12" cy="12" r="10"/><path d="M12 2c-4 5-4 15 0 20"/><path d="M12 2c4 5 4 15 0 20"/><path d="M2.5 9c5 2 14 2 19 0"/></svg>
      計分板
    </div>
    <div class="tab" data-tab="admin" onclick="switchTab('admin')">後台計分</div>
  </div>

  <section id="view-scoreboard">
    <div class="section-title">
      <svg class="vb" viewBox="0 0 24 24" fill="none" stroke="var(--jci)" stroke-width="1.8"><circle cx="12" cy="12" r="10"/><path d="M12 2c-4 5-4 15 0 20"/><path d="M12 2c4 5 4 15 0 20"/></svg>
      即時比數
    </div>
    <div id="live" class="live-grid"></div>
    <div id="schedule-wrap">
      <div class="section-title">完整賽程</div>
      <div id="schedule"></div>
    </div>
  </section>

  <section id="view-admin" class="hidden">
    <div class="section-title">後台計分</div>
    <div class="filters" id="filters">
      <div class="filter active" data-f="all" onclick="setFilter('all')">全部</div>
      <div class="filter" data-f="live" onclick="setFilter('live')">進行中</div>
      <div class="filter" data-f="sched" onclick="setFilter('sched')">未開始</div>
      <div class="filter" data-f="done" onclick="setFilter('done')">已結束</div>
    </div>
    <div id="admin" class="admin-grid"></div>
    <p class="hint">
      點「開始」後即可加減分。第 1–4 局 25 分、決勝局（第 5 局）15 分，皆需淨勝 2 分；
      系統會自動判定該局結束、自動換局、整場勝負。隊名、賽事名稱與副標都可直接點擊修改，會徽可從右上角上傳。<br>
      所有資料自動存在這台電腦的瀏覽器，重開不會遺失；要備份或換電腦請用「匯出 JSON」。
    </p>
  </section>
</div>

<button class="btn board-exit hidden" id="boardExit" onclick="location.hash=''; location.reload();">離開大螢幕</button>

<script>
/* ============ 設定 ============ */
const STORAGE_KEY = 'vb_jci_tournament_v1';
const RULES = { setsToWin:3, regular:25, deciding:15, margin:2 };
const channel = ('BroadcastChannel' in window) ? new BroadcastChannel('vb_jci_scoreboard') : null;
const VB_ICON = '<svg class="vb" viewBox="0 0 24 24" fill="none" stroke="var(--jci)" stroke-width="1.6"><circle cx="12" cy="12" r="10"/><path d="M12 2c-4 5-4 15 0 20"/><path d="M12 2c4 5 4 15 0 20"/><path d="M2.5 9c5 2 14 2 19 0"/></svg>';

/* ============ 資料 ============ */
function roundRobin(ids){
  const res=[], arr=ids.slice(), n=arr.length;
  if(n<2) return res;
  for(let r=0;r<n-1;r++){
    for(let i=0;i<Math.floor(n/2);i++) res.push([r+1, arr[i], arr[n-1-i]]);
    const last=arr.pop(); arr.splice(1,0,last);
  }
  return res;
}
function defaultBrand(){ return { title:'青商盃排球錦標賽', subtitle:'JCI VOLLEYBALL CUP · 青年商會', logo:'' }; }
function seed(){
  const groups=['A','B','C','D'], teams=[]; let id=1;
  for(const g of groups) for(let n=1;n<=4;n++){ teams.push({id, name:`${g} 組 第 ${n} 隊`, group:g}); id++; }
  const matches=[]; let mid=1, court=0;
  for(const g of groups){
    const ids=teams.filter(t=>t.group===g).map(t=>t.id);
    for(const [round,home,away] of roundRobin(ids)){
      matches.push({id:mid, homeId:home, awayId:away, group:g, court:`場地 ${court%2+1}`, time:`第 ${round} 輪`, status:0, sets:[], currentSet:0});
      mid++; court++;
    }
  }
  return {brand:defaultBrand(), teams, matches};
}
function load(){
  try{ const raw=localStorage.getItem(STORAGE_KEY); if(!raw) return null;
    const d=JSON.parse(raw);
    if(d&&Array.isArray(d.teams)&&Array.isArray(d.matches)&&d.teams.length&&d.matches.length){
      if(!d.brand) d.brand=defaultBrand();
      return d;
    } }catch(e){}
  return null;
}
let state = load() || seed();
function commit(){
  try{ localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); }catch(e){ alert('儲存失敗（可能是會徽圖片太大）：'+e.message); }
  if(channel) channel.postMessage('updated');
  render();
}
if(channel) channel.onmessage = () => { const d=load(); if(d){ state=d; render(); } };
window.addEventListener('storage', e=>{ if(e.key===STORAGE_KEY){ const d=load(); if(d){ state=d; render(); } } });

/* ============ 計分邏輯 ============ */
const find = id => state.matches.find(m=>m.id===id);
const teamName = id => { const t=state.teams.find(x=>x.id===id); return t? t.name : '—'; };
const setsWon = (m,side) => m.sets.filter(s=>s.finished && (side==='home'? s.home>s.away : s.away>s.home)).length;
function evaluate(m){
  const cs=m.sets[m.currentSet]; if(!cs || cs.finished) return;
  let hw=setsWon(m,'home'), aw=setsWon(m,'away');
  const decider=(hw===RULES.setsToWin-1 && aw===RULES.setsToWin-1);
  const target=decider?RULES.deciding:RULES.regular;
  const hi=Math.max(cs.home,cs.away), lo=Math.min(cs.home,cs.away);
  if(hi>=target && (hi-lo)>=RULES.margin){
    cs.finished=true;
    hw=setsWon(m,'home'); aw=setsWon(m,'away');
    if(hw>=RULES.setsToWin || aw>=RULES.setsToWin) m.status=2;
    else { m.sets.push({home:0,away:0,finished:false}); m.currentSet++; }
  }
}
function startMatch(id){ const m=find(id); if(!m||m.status===2) return; m.status=1;
  if(m.sets.length===0){ m.sets.push({home:0,away:0,finished:false}); m.currentSet=0; } commit(); }
function addPoint(id,side,delta){ const m=find(id); if(!m||m.status!==1) return;
  const cs=m.sets[m.currentSet]; if(!cs) return;
  if(side==='home') cs.home=Math.max(0,cs.home+delta); else cs.away=Math.max(0,cs.away+delta);
  evaluate(m); commit(); }
function finishMatch(id){ const m=find(id); if(!m) return; m.status=2; commit(); }
function resetMatch(id){ const m=find(id); if(!m) return;
  if(!confirm('確定要重設整場比賽？所有比分會清空。')) return;
  m.sets=[]; m.currentSet=0; m.status=0; commit(); }
function renameTeam(tid,name){ const t=state.teams.find(x=>x.id===tid); if(t && name.trim()) t.name=name.trim(); commit(); }

/* ============ 品牌（賽事名稱 / 會徽） ============ */
function setBrand(key,val){ state.brand[key]=val; commit(); }
function onLogoClick(e){ if(e.target.classList.contains('x')) return; document.getElementById('logoFile').click(); }
function clearLogo(e){ e.stopPropagation(); state.brand.logo=''; commit(); }
function uploadLogo(file){
  if(!file) return;
  const r=new FileReader();
  r.onload=()=>{
    const img=new Image();
    img.onload=()=>{
      const max=240, sc=Math.min(1, max/Math.max(img.width,img.height));
      const c=document.createElement('canvas');
      c.width=Math.round(img.width*sc); c.height=Math.round(img.height*sc);
      c.getContext('2d').drawImage(img,0,0,c.width,c.height);
      state.brand.logo=c.toDataURL('image/png'); commit();
    };
    img.onerror=()=>alert('圖片讀取失敗。');
    img.src=r.result;
  };
  r.readAsDataURL(file);
}

/* ============ 介面 ============ */
let curTab='scoreboard', curFilter='all';
function switchTab(t){ curTab=t;
  document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('active', el.dataset.tab===t));
  document.getElementById('view-scoreboard').classList.toggle('hidden', t!=='scoreboard');
  document.getElementById('view-admin').classList.toggle('hidden', t!=='admin');
}
function setFilter(f){ curFilter=f;
  document.querySelectorAll('.filter').forEach(el=>el.classList.toggle('active', el.dataset.f===f));
  renderAdmin();
}
const statusName = s => s===1?'進行中' : s===2?'已結束' : '未開始';
const statusClass = s => s===1?'s-live' : s===2?'s-done' : 's-sched';

function render(){ renderBrand(); renderLive(); renderSchedule(); if(!adminFocused()) renderAdmin(); }
function focusedIs(cls){ const a=document.activeElement; return a && a.classList && a.classList.contains(cls); }
function adminFocused(){ return focusedIs('team-edit'); }

function renderBrand(){
  const b=state.brand||defaultBrand();
  if(!focusedIs('evt-title')) document.getElementById('evtTitle').value=b.title||'';
  if(!focusedIs('evt-sub')) document.getElementById('evtSub').value=b.subtitle||'';
  document.getElementById('boardTitle').textContent=b.title||'';
  document.getElementById('boardSub').textContent=b.subtitle||'';
  const slot=document.getElementById('logoSlot');
  if(b.logo){ slot.classList.add('has-logo'); slot.querySelector('.ph').style.display='none';
    let im=slot.querySelector('img'); if(!im){ im=document.createElement('img'); slot.insertBefore(im, slot.querySelector('.x')); }
    im.src=b.logo;
  } else { slot.classList.remove('has-logo'); slot.querySelector('.ph').style.display='';
    const im=slot.querySelector('img'); if(im) im.remove();
  }
}

function renderLive(){
  const box=document.getElementById('live');
  const live=state.matches.filter(m=>m.status===1);
  const recent=state.matches.filter(m=>m.status===2).slice(-3).reverse();
  const show=[...live, ...recent];
  if(show.length===0){ box.innerHTML=`<div class="empty">${VB_ICON}目前沒有進行中的比賽。<br>到「後台計分」按「開始」即可開賽。</div>`; return; }
  box.innerHTML = show.map(m=>{
    const hw=setsWon(m,'home'), aw=setsWon(m,'away');
    const cs=m.sets[m.currentSet]; const ch=cs?cs.home:0, ca=cs?cs.away:0;
    const homeWin=m.status===2&&hw>aw, awayWin=m.status===2&&aw>hw;
    const chips=m.sets.map((s,i)=>`<span class="chip">局${i+1} <b>${s.home}-${s.away}</b></span>`).join('');
    return `<div class="lcard ${m.status===1?'live':''}">
      <div class="lcard-top">
        <span class="badge group">${m.group} 組</span>
        <span class="badge ${statusClass(m.status)}">${statusName(m.status)}</span>
        <span style="margin-left:auto">${m.court} · ${m.time}</span>
      </div>
      <div class="team-row">
        <div class="tname ${homeWin?'win':''}">${teamName(m.homeId)}</div>
        <div style="display:flex; align-items:center; gap:14px;">
          <div class="tscore">${hw}</div>${m.status===1?`<div class="tscore cur">${ch}</div>`:''}
        </div>
      </div>
      <div class="team-row">
        <div class="tname ${awayWin?'win':''}">${teamName(m.awayId)}</div>
        <div style="display:flex; align-items:center; gap:14px;">
          <div class="tscore">${aw}</div>${m.status===1?`<div class="tscore cur">${ca}</div>`:''}
        </div>
      </div>
      ${m.sets.length?`<div class="sets-chips">${chips}</div>`:''}
    </div>`;
  }).join('');
}

function renderSchedule(){
  const box=document.getElementById('schedule');
  const groups=[...new Set(state.matches.map(m=>m.group))];
  box.innerHTML = groups.map(g=>{
    const ms=state.matches.filter(m=>m.group===g);
    const cards=ms.map(m=>{
      const hw=setsWon(m,'home'), aw=setsWon(m,'away');
      const score = m.status===0 ? `<span class="meta">${m.time}</span>` : `<span class="mini-score">${hw} - ${aw}</span>`;
      return `<div class="scard">
        <div class="row"><span class="vs-team">${teamName(m.homeId)}</span>${score}</div>
        <div class="row"><span class="vs-team">${teamName(m.awayId)}</span>
          <span class="badge ${statusClass(m.status)}">${statusName(m.status)}</span></div>
        <div class="meta">${m.court} · ${m.time}</div></div>`;
    }).join('');
    return `<div class="group-block"><div class="section-title" style="margin-top:14px">${g} 組</div>
      <div class="sched-grid">${cards}</div></div>`;
  }).join('');
}

function renderAdmin(){
  const box=document.getElementById('admin');
  let ms=state.matches;
  if(curFilter==='live') ms=ms.filter(m=>m.status===1);
  else if(curFilter==='sched') ms=ms.filter(m=>m.status===0);
  else if(curFilter==='done') ms=ms.filter(m=>m.status===2);
  if(ms.length===0){ box.innerHTML='<div class="empty">這個篩選下沒有比賽。</div>'; return; }
  box.innerHTML = ms.map(m=>{
    const hw=setsWon(m,'home'), aw=setsWon(m,'away');
    const cs=m.sets[m.currentSet]; const ch=cs?cs.home:0, ca=cs?cs.away:0;
    const live=m.status===1;
    const chips=m.sets.map((s,i)=>`<span class="chip">局${i+1} <b>${s.home}-${s.away}</b>${s.finished?' ✓':''}</span>`).join('');
    const stepper=(side,val)=>`<div class="stepper">
        <button class="sbtn minus" ${live?'':'disabled'} onclick="addPoint(${m.id},'${side}',-1)">−</button>
        <div class="snum">${val}</div>
        <button class="sbtn" ${live?'':'disabled'} onclick="addPoint(${m.id},'${side}',1)">＋</button></div>`;
    let actions='';
    if(m.status===0) actions=`<button class="btn go" onclick="startMatch(${m.id})">開始比賽</button>`;
    else if(m.status===1) actions=`<button class="btn fin" onclick="finishMatch(${m.id})">結束</button><button class="btn warn" onclick="resetMatch(${m.id})">重設</button>`;
    else actions=`<button class="btn warn" onclick="resetMatch(${m.id})">重設</button>`;
    return `<div class="acard ${live?'live':''}">
      <div class="acard-top">
        <span class="badge group">${m.group} 組</span>
        <span class="badge ${statusClass(m.status)}">${statusName(m.status)}</span>
        <span style="margin-left:auto">${m.court} · ${m.time}</span>
        ${live?`<span class="cur-set-tag">第 ${m.currentSet+1} 局</span>`:''}
      </div>
      <div class="side">
        <div class="nm"><input class="team-edit" value="${teamName(m.homeId).replace(/"/g,'&quot;')}" onchange="renameTeam(${m.homeId}, this.value)"></div>
        <div class="snum" style="color:var(--muted); font-size:18px; min-width:24px">${hw}</div>${stepper('home',ch)}
      </div>
      <div class="side">
        <div class="nm"><input class="team-edit" value="${teamName(m.awayId).replace(/"/g,'&quot;')}" onchange="renameTeam(${m.awayId}, this.value)"></div>
        <div class="snum" style="color:var(--muted); font-size:18px; min-width:24px">${aw}</div>${stepper('away',ca)}
      </div>
      ${m.sets.length?`<div class="sets-chips">${chips}</div>`:''}
      <div class="acard-actions">${actions}</div>
    </div>`;
  }).join('');
}

/* ============ JSON 匯出 / 匯入 ============ */
function exportJSON(){
  state.savedAt=new Date().toISOString();
  const blob=new Blob([JSON.stringify(state,null,2)], {type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='tournament.json'; a.click();
  URL.revokeObjectURL(a.href);
}
function importJSON(file){
  if(!file) return;
  const r=new FileReader();
  r.onload=()=>{ try{ const d=JSON.parse(r.result);
      if(d&&Array.isArray(d.teams)&&Array.isArray(d.matches)){ if(!d.brand)d.brand=defaultBrand(); state=d; commit(); alert('已匯入賽程與比分。'); }
      else alert('JSON 格式不符（缺少 teams 或 matches）。'); }
    catch(e){ alert('讀取失敗：'+e.message); } };
  r.readAsText(file,'utf-8');
}
function resetAll(){
  if(!confirm('確定要清除全部資料、重新產生 16 隊預設賽程？此動作無法復原（建議先匯出備份）。')) return;
  const keepBrand=state.brand; state=seed(); state.brand=keepBrand||defaultBrand(); commit();
}

/* ============ 大螢幕模式 ============ */
function openBoard(){ window.open(location.pathname + '#board', '_blank'); }
function applyBoardMode(){
  const on=location.hash==='#board';
  document.body.classList.toggle('board-mode', on);
  document.getElementById('boardExit').classList.toggle('hidden', !on);
  if(on) curTab='scoreboard';
}
window.addEventListener('hashchange', applyBoardMode);

/* ============ 啟動 ============ */
applyBoardMode();
render();
</script>
